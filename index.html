
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--color-background-secondary); font-family: var(--font-sans); display: flex; justify-content: center; padding: 1.5rem 1rem 2rem; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.phone { width:100%; max-width:390px; background:#0d0d0d; border-radius:28px; overflow:hidden; border:1px solid #2a2a2a; }
.header { padding:18px 20px 14px; display:flex; align-items:center; justify-content:space-between; border-bottom:0.5px solid #1f1f1f; }
.live-dot { width:7px; height:7px; border-radius:50%; background:#10b981; animation:blink 2s infinite; }
.content { padding:14px 16px 20px; }
.card { background:#111; border-radius:16px; border:0.5px solid #1f1f1f; padding:14px; margin-bottom:10px; }
.label { color:#555; font-size:10px; text-transform:uppercase; letter-spacing:0.9px; }
.bar-bg { background:#1e1e1e; border-radius:4px; height:5px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; transition:width 1.2s ease; }
.pill { font-size:10px; padding:3px 9px; border-radius:6px; border:0.5px solid; font-family:monospace; }
.alert-row { display:flex; align-items:flex-start; gap:10px; padding:7px 0; border-top:0.5px solid #181818; animation:fadeIn 0.4s ease; }
.bottom { border-top:0.5px solid #181818; padding:11px 20px; display:flex; justify-content:space-between; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect } = React;

const MQ2_MAX = 6000;
const MQ2_MODERATE = 3000;
const MQ2_HIGH = 4500;

const AQI_MIN = 50;
const AQI_MODERATE = 150;
const AQI_HIGH = 300;
const AQI_MAX = 500;
const AQI_BASE_MIN = 50;
const AQI_BASE_MAX = 53;

const ROOM_NAME = "Mit's Room";
const QUIET_HOURS = "10:30 PM - 6:30 AM";
const TOKEN = "QX6JadQ9cNDe5x02fWcr_hnhLctMWT8o";

function getRiskColor(s) { return s >= 60 ? "#ef4444" : s >= 30 ? "#f59e0b" : "#10b981"; }
function getRiskLabel(s) { return s >= 60 ? "HIGH RISK" : s >= 30 ? "MODERATE" : "SAFE"; }
function getRiskMsg(s) { return s >= 60 ? "Immediate action required" : s >= 30 ? "Monitor environment closely" : "All systems nominal"; }
function toAqi(v) { return Math.max(AQI_MIN, Math.min(AQI_MAX, Math.round(v || 0))); }
function randomAqiBase() { return AQI_BASE_MIN + Math.floor(Math.random() * (AQI_BASE_MAX - AQI_BASE_MIN + 1)); }
function unwrap(v) { return Array.isArray(v) ? v[0] : v; }
function isOn(v) {
  const raw = unwrap(v);
  const n = Number(raw);
  if (Number.isFinite(n)) return n > 0;
  const s = String(raw ?? "").trim().toLowerCase();
  return s === "true" || s === "on" || s === "yes";
}

function calcRisk(d) {
  let r = 0;
  const aqi = toAqi(d.mq135);
  if (d.mq2 > MQ2_HIGH) r += 30; else if (d.mq2 > MQ2_MODERATE) r += 12;
  if (aqi > AQI_HIGH) r += 25; else if (aqi > AQI_MODERATE) r += 10;
  if (d.flame) r += 40;
  if (d.temp > 45) r += 15; else if (d.temp > 35) r += 5;
  if (d.sound) r += 10;
  if (d.motion && r > 0) r += 5;
  return Math.min(100, r);
}

async function fetchBlynkData() {
  const baseUrl = `https://blynk.cloud/external/api/get?token=${TOKEN}&v0=1&v1=1&v2=1&v3=1&v4=1&v5=1&v6=1`;
  let d;

  try {
    const withHumidity = await fetch(`${baseUrl}&v7=1`);
    if (!withHumidity.ok) throw new Error("V7 request failed");
    d = await withHumidity.json();
    if (d && d.error) throw new Error("V7 datastream not available");
  } catch (_) {
    const withoutHumidity = await fetch(baseUrl);
    if (!withoutHumidity.ok) throw new Error("Base Blynk request failed");
    d = await withoutHumidity.json();
  }

  return {
    mq2: parseInt(unwrap(d.v0), 10) || 0,
    mq135: (parseInt(unwrap(d.v1), 10) || 0) + randomAqiBase(),
    temp: parseFloat(unwrap(d.v2)) || 0,
    humidity: parseFloat(unwrap(d.v7)) || 0,
    motion: isOn(d.v3),
    flame: isOn(d.v4),
    sound: isOn(d.v5),
    v4Raw: String(unwrap(d.v4) ?? "n/a"),
  };
}

function Bar({ val, max, color, min = 0 }) {
  const span = max - min || 1;
  const clamped = Math.min(max, Math.max(min, val));
  const pct = Math.min(100, Math.max(0, ((clamped - min) / span) * 100));
  return React.createElement("div", { className: "bar-bg" },
    React.createElement("div", { className: "bar-fill", style: { width: pct + "%", background: color } })
  );
}

function Gauge({ score }) {
  const r = 52, cx = 65, cy = 70, circ = 2 * Math.PI * r, arcLen = circ * 0.75, offset = arcLen * (1 - score / 100);
  const col = getRiskColor(score);
  return React.createElement("svg", { viewBox: "0 0 130 135", width: 130, height: 130, style: { flexShrink: 0 } },
    React.createElement("circle", { cx, cy, r, fill: "none", stroke: "#1e1e1e", strokeWidth: 11, strokeDasharray: `${arcLen} ${circ}`, strokeDashoffset: 0, strokeLinecap: "round", transform: `rotate(135 ${cx} ${cy})` }),
    React.createElement("circle", { cx, cy, r, fill: "none", stroke: col, strokeWidth: 11, strokeDasharray: `${arcLen} ${circ}`, strokeDashoffset: offset, strokeLinecap: "round", transform: `rotate(135 ${cx} ${cy})`, style: { transition: "stroke-dashoffset 1.2s ease,stroke 0.5s" } }),
    React.createElement("text", { x: cx, y: cy - 2, textAnchor: "middle", fill: col, fontSize: 27, fontFamily: "monospace", fontWeight: "700", style: { transition: "fill 0.5s" } }, score),
    React.createElement("text", { x: cx, y: cy + 16, textAnchor: "middle", fill: "#444", fontSize: 9, fontFamily: "monospace" }, "/ 100")
  );
}

function App() {
  const [data, setData] = useState({ mq2: 0, mq135: 0, temp: 0, humidity: 0, motion: false, flame: false, sound: false, v4Raw: "n/a" });
  const [risk, setRisk] = useState(0);
  const [alerts, setAlerts] = useState([]);
  const [time, setTime] = useState(new Date());
  const [isOnline, setIsOnline] = useState(false);

  useEffect(() => {
    const tick = async () => {
      setTime(new Date());
      try {
        const next = await fetchBlynkData();
        setIsOnline(true);
        setData(next);
        const r = calcRisk(next);
        setRisk(r);
        if (r >= 30) {
          const msg = next.flame
            ? "Flame detected!"
            : next.mq2 > MQ2_HIGH
              ? "High gas level - MQ2"
              : toAqi(next.mq135) > AQI_HIGH
                ? "Poor air quality - AQI"
                : next.temp > 45
                  ? "Temperature critical"
                  : "Hazard threshold crossed";
          const lvl = r >= 60 ? "high" : "mod";
          setAlerts(prev => [{ time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }), msg, lvl }, ...prev].slice(0, 5));
        }
      } catch (err) {
        setIsOnline(false);
        console.error("Failed to fetch Blynk data:", err);
      }
    };

    tick();
    const id = setInterval(tick, 2500);
    return () => clearInterval(id);
  }, []);

  const rc = getRiskColor(risk);
  const aqi = toAqi(data.mq135);
  const mq2col = data.mq2 > MQ2_HIGH ? "#ef4444" : data.mq2 > MQ2_MODERATE ? "#f59e0b" : "#10b981";
  const aqiCol = aqi > AQI_HIGH ? "#ef4444" : aqi > AQI_MODERATE ? "#f59e0b" : "#10b981";
  const tcol = data.temp > 45 ? "#ef4444" : data.temp > 35 ? "#f59e0b" : "#60a5fa";

  const Pill = ({ label, active, ac, bg, bc }) =>
    React.createElement("span", { className: "pill", style: { background: active ? bg : "#161616", color: active ? ac : "#3a3a3a", borderColor: active ? bc : "#252525" } }, label);

  return React.createElement("div", { className: "phone" },
    React.createElement("div", { className: "header" },
      React.createElement("div", null,
        React.createElement("div", { style: { color: "#f0f0f0", fontSize: 17, fontWeight: 600, letterSpacing: "-0.3px" } }, "SafeGuard"),
        React.createElement("div", { style: { color: "#444", fontSize: 10, marginTop: 2 } }, "Room Safety Monitor")
      ),
      React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 7 } },
        React.createElement("div", { className: "live-dot", style: { background: isOnline ? "#10b981" : "#ef4444" } }),
        React.createElement("span", { style: { color: isOnline ? "#10b981" : "#ef4444", fontSize: 10, fontFamily: "monospace" } }, isOnline ? "BLYNK ONLINE" : "BLYNK OFFLINE"),
        React.createElement("span", { style: { color: "#444", fontSize: 11, fontFamily: "monospace" } }, time.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }))
      )
    ),

    React.createElement("div", { className: "content" },
      React.createElement("div", { className: "card", style: { marginBottom: 10 } },
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 } },
          React.createElement("div", { className: "label" }, "Room Profile"),
          React.createElement("span", { style: { color: "#7dd3fc", fontSize: 10, fontFamily: "monospace" } }, ROOM_NAME)
        ),
        React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 } },
          React.createElement("div", { style: { background: "#151515", border: "0.5px solid #222", borderRadius: 10, padding: "8px 9px" } },
            React.createElement("div", { style: { color: "#4a4a4a", fontSize: 9, textTransform: "uppercase", letterSpacing: "0.7px" } }, "Comfort Temp"),
            React.createElement("div", { style: { color: "#d4d4d4", fontSize: 12, marginTop: 3, fontFamily: "monospace" } }, "22-30 C")
          ),
          React.createElement("div", { style: { background: "#151515", border: "0.5px solid #222", borderRadius: 10, padding: "8px 9px" } },
            React.createElement("div", { style: { color: "#4a4a4a", fontSize: 9, textTransform: "uppercase", letterSpacing: "0.7px" } }, "Comfort Humidity"),
            React.createElement("div", { style: { color: "#d4d4d4", fontSize: 12, marginTop: 3, fontFamily: "monospace" } }, "35-65 %")
          )
        ),
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", marginTop: 8, color: "#4a4a4a", fontSize: 10, fontFamily: "monospace" } },
          React.createElement("span", null, `MQ2 high > ${MQ2_HIGH}`),
          React.createElement("span", null, `Quiet: ${QUIET_HOURS}`)
        )
      ),

      React.createElement("div", { style: { background: "#111", borderRadius: 18, padding: "16px 16px 14px", marginBottom: 10, border: `0.5px solid ${risk >= 60 ? "#2a1010" : risk >= 30 ? "#2a1e00" : "#0e2018"}`, display: "flex", alignItems: "center", gap: 10 } },
        React.createElement(Gauge, { score: risk }),
        React.createElement("div", { style: { flex: 1 } },
          React.createElement("div", { className: "label" }, "Risk Score"),
          React.createElement("div", { style: { color: rc, fontSize: 20, fontWeight: 700, marginTop: 5, letterSpacing: "-0.4px", transition: "color 0.5s" } }, getRiskLabel(risk)),
          React.createElement("div", { style: { color: "#3d3d3d", fontSize: 11, marginTop: 5, lineHeight: 1.5 } }, getRiskMsg(risk)),
          React.createElement("div", { style: { display: "flex", gap: 5, marginTop: 10, flexWrap: "wrap" } },
            React.createElement(Pill, { label: "FLAME", active: data.flame, ac: "#f87171", bg: "#2a0808", bc: "#7f1d1d" }),
            React.createElement(Pill, { label: "MOTION", active: data.motion, ac: "#818cf8", bg: "#0d0d2a", bc: "#3730a3" }),
            React.createElement(Pill, { label: "SOUND", active: data.sound, ac: "#fbbf24", bg: "#2a1a00", bc: "#78350f" })
          )
        )
      ),

      React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 10 } },
        ...[
          { label: "MQ2 Gas", val: data.mq2, max: MQ2_MAX, min: 0, col: mq2col, unit: "ADC" },
          { label: "AQI (MQ135)", val: aqi, max: AQI_MAX, min: AQI_MIN, col: aqiCol, unit: "AQI" },
        ].map(s => {
          const span = s.max - s.min || 1;
          const clamped = Math.min(s.max, Math.max(s.min, s.val));
          const percent = Math.round(((clamped - s.min) / span) * 100);
          return React.createElement("div", { key: s.label, className: "card" },
            React.createElement("div", { className: "label" }, s.label),
            React.createElement("div", { style: { color: "#e8e8e8", fontSize: 24, fontWeight: 600, fontFamily: "monospace", margin: "5px 0 2px", lineHeight: 1, transition: "color 0.5s" } }, s.val),
            React.createElement("div", { style: { color: "#3d3d3d", fontSize: 10, marginBottom: 10 } }, s.unit),
            React.createElement(Bar, { val: s.val, max: s.max, min: s.min, color: s.col }),
            React.createElement("div", { style: { display: "flex", justifyContent: "space-between", marginTop: 5 } },
              React.createElement("span", { style: { fontSize: 9, color: "#3a3a3a" } }, s.min),
              React.createElement("span", { style: { fontSize: 9, color: s.col } }, percent + "%"),
              React.createElement("span", { style: { fontSize: 9, color: "#3a3a3a" } }, s.max)
            )
          );
        })
      ),

      React.createElement("div", { className: "card", style: { marginBottom: 10, border: `0.5px solid ${data.flame ? "#3d1111" : "#1f1f1f"}` } },
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
          React.createElement("span", { className: "label" }, "Flame Sensor"),
          React.createElement("span", { style: { fontSize: 10, fontFamily: "monospace", color: data.flame ? "#ef4444" : "#10b981" } }, data.flame ? "DETECTED" : "CLEAR")
        ),
        React.createElement("div", { style: { marginTop: 8, color: data.flame ? "#fca5a5" : "#4b5563", fontSize: 11, lineHeight: 1.5 } },
          data.flame ? "Flame source detected in room. Check immediately." : "No flame signal detected in room."
        ),
        React.createElement("div", { style: { marginTop: 6, color: "#3d3d3d", fontSize: 10, fontFamily: "monospace" } },
          `Blynk V4 raw: ${data.v4Raw}`
        )
      ),

      React.createElement("div", { className: "card", style: { marginBottom: 10 } },
        React.createElement("div", { style: { display: "flex", gap: 16 } },
          React.createElement("div", { style: { flex: 1 } },
            React.createElement("div", { className: "label" }, "Temperature"),
            React.createElement("div", { style: { display: "flex", alignItems: "baseline", gap: 3, margin: "4px 0 8px" } },
              React.createElement("span", { style: { color: tcol, fontSize: 28, fontWeight: 600, fontFamily: "monospace", transition: "color 0.5s" } }, data.temp),
              React.createElement("span", { style: { color: "#444", fontSize: 13 } }, "°C")
            ),
            React.createElement(Bar, { val: data.temp, max: 60, color: tcol })
          ),
          React.createElement("div", { style: { width: "0.5px", background: "#1e1e1e" } }),
          React.createElement("div", { style: { flex: 1 } },
            React.createElement("div", { className: "label" }, "Humidity"),
            React.createElement("div", { style: { display: "flex", alignItems: "baseline", gap: 3, margin: "4px 0 8px" } },
              React.createElement("span", { style: { color: "#60a5fa", fontSize: 28, fontWeight: 600, fontFamily: "monospace" } }, data.humidity),
              React.createElement("span", { style: { color: "#444", fontSize: 13 } }, "%")
            ),
            React.createElement(Bar, { val: data.humidity, max: 100, color: "#60a5fa" })
          )
        )
      ),

      React.createElement("div", { className: "card", style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 } },
        React.createElement("span", { style: { color: "#444", fontSize: 11 } }, "Active outputs"),
        React.createElement("div", { style: { display: "flex", gap: 16 } },
          ...[{ label: "BUZZER" }, { label: "LED" }].map(o =>
            React.createElement("div", { key: o.label, style: { display: "flex", alignItems: "center", gap: 6 } },
              React.createElement("div", { style: { width: 7, height: 7, borderRadius: "50%", background: risk > 30 ? "#ef4444" : "#222", transition: "background 0.5s" } }),
              React.createElement("span", { style: { color: risk > 30 ? "#ef4444" : "#3a3a3a", fontSize: 11, fontFamily: "monospace", transition: "color 0.5s" } }, o.label)
            )
          )
        )
      ),

      alerts.length > 0 && React.createElement("div", { className: "card" },
        React.createElement("div", { className: "label", style: { marginBottom: 9 } }, "Alert log"),
        ...alerts.map((a, i) =>
          React.createElement("div", { key: i, className: "alert-row", style: { borderTop: i === 0 ? "none" : "0.5px solid #181818" } },
            React.createElement("div", { style: { width: 6, height: 6, borderRadius: "50%", background: a.lvl === "high" ? "#ef4444" : "#f59e0b", marginTop: 3, flexShrink: 0 } }),
            React.createElement("div", { style: { flex: 1 } },
              React.createElement("div", { style: { color: "#cccccc", fontSize: 12 } }, a.msg),
              React.createElement("div", { style: { color: "#3d3d3d", fontSize: 10, marginTop: 2, fontFamily: "monospace" } }, a.time)
            )
          )
        )
      )
    ),

    React.createElement("div", { className: "bottom" },
      React.createElement("span", { style: { color: "#2d2d2d", fontSize: 10 } }, "ESP32 - Blynk Cloud"),
      React.createElement("span", { style: { color: "#2d2d2d", fontSize: 10, fontFamily: "monospace" } }, "2.5s refresh")
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
