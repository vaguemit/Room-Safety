<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { width: 100%; min-height: 100%; }
body { background: #0b0b0b; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.phone { width:100vw; min-height:100vh; background:#0d0d0d; overflow:hidden; }
.header { padding:18px 20px 14px; display:flex; align-items:center; justify-content:space-between; border-bottom:0.5px solid #1f1f1f; }
.live-dot { width:7px; height:7px; border-radius:50%; animation:blink 2s infinite; }
.content { padding:14px 16px 20px; }
.card { background:#111; border-radius:16px; border:0.5px solid #1f1f1f; padding:14px; margin-bottom:10px; }
.label { color:#555; font-size:10px; text-transform:uppercase; letter-spacing:0.9px; }
.bar-bg { background:#1e1e1e; border-radius:4px; height:5px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; transition:width 1.2s ease; }
.pill { font-size:10px; padding:3px 9px; border-radius:6px; border:0.5px solid; font-family:monospace; }
.alert-row { display:flex; align-items:flex-start; gap:10px; padding:7px 0; border-top:0.5px solid #181818; animation:fadeIn 0.4s ease; }
.bottom { border-top:0.5px solid #181818; padding:11px 20px; display:flex; justify-content:space-between; }
@media (min-width: 960px) {
  .header, .content, .bottom { max-width: 1100px; margin: 0 auto; }
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect } = React;

// ─── CONFIG — fill these in ───────────────────────
const CHANNEL_ID = "3326505";       // number from channel page
const READ_KEY   = "XLYBYPTMWTEZ30GK";     // from API Keys tab
const ROOM_NAME  = "Safety Monitor";
// ─────────────────────────────────────────────────

const MQ2_MODERATE = 3000;
const MQ2_HIGH     = 4500;
const MQ2_MAX      = 6000;
const AQI_MODERATE = 150;
const AQI_HIGH     = 300;
const AQI_MAX      = 500;
const AQI_BASE_MIN = 50;
const AQI_BASE_MAX = 53;

function getRiskColor(s) { return s >= 60 ? "#ef4444" : s >= 30 ? "#f59e0b" : "#10b981"; }
function getRiskLabel(s) { return s >= 60 ? "HIGH RISK" : s >= 30 ? "MODERATE" : "SAFE"; }
function getRiskMsg(s)   { return s >= 60 ? "Immediate action required" : s >= 30 ? "Monitor environment closely" : "All systems nominal"; }
function randomAqiBase() { return AQI_BASE_MIN + Math.floor(Math.random() * (AQI_BASE_MAX - AQI_BASE_MIN + 1)); }

function calcRisk(d) {
  let r = 0;
  if (d.mq2 > MQ2_HIGH)     r += 30;
  else if (d.mq2 > MQ2_MODERATE) r += 12;
  if (d.aqi > AQI_HIGH)      r += 25;
  else if (d.aqi > AQI_MODERATE) r += 10;
  if (d.flame)               r += 40;
  if (d.temp > 45)           r += 15;
  else if (d.temp > 35)      r += 5;
  if (d.motion && r > 0)    r += 5;
  return Math.min(100, r);
}

async function fetchData() {
  const url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds/last.json?api_key=${READ_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("fetch failed");
  const d = await res.json();
  const aqiSensor = parseInt(d.field7) || 0;
  const aqiBase = randomAqiBase();
  return {
    mq2:      parseInt(d.field1)  || 0,
    temp:     parseFloat(d.field2) || 0,
    humidity: parseFloat(d.field3) || 0,
    flame:    d.field4 === "1",
    motion:   d.field5 === "1",
    risk:     parseInt(d.field6)  || 0,
    aqi:      Math.min(AQI_MAX, aqiSensor + aqiBase),
    aqiBase,
    field4Raw: d.field4 ?? "n/a",
  };
}

function Bar({ val, max, min = 0, color }) {
  const pct = Math.min(100, Math.max(0, ((Math.min(max, Math.max(min, val)) - min) / (max - min || 1)) * 100));
  return React.createElement("div", { className: "bar-bg" },
    React.createElement("div", { className: "bar-fill", style: { width: pct + "%", background: color } })
  );
}

function Gauge({ score }) {
  const r = 52, cx = 65, cy = 70, circ = 2 * Math.PI * r;
  const arcLen = circ * 0.75;
  const offset = arcLen * (1 - score / 100);
  const col = getRiskColor(score);
  return React.createElement("svg", { viewBox: "0 0 130 135", width: 130, height: 130, style: { flexShrink: 0 } },
    React.createElement("circle", { cx, cy, r, fill: "none", stroke: "#1e1e1e", strokeWidth: 11, strokeDasharray: `${arcLen} ${circ}`, strokeLinecap: "round", transform: `rotate(135 ${cx} ${cy})` }),
    React.createElement("circle", { cx, cy, r, fill: "none", stroke: col, strokeWidth: 11, strokeDasharray: `${arcLen} ${circ}`, strokeDashoffset: offset, strokeLinecap: "round", transform: `rotate(135 ${cx} ${cy})`, style: { transition: "stroke-dashoffset 1.2s ease, stroke 0.5s" } }),
    React.createElement("text", { x: cx, y: cy - 2, textAnchor: "middle", fill: col, fontSize: 27, fontFamily: "monospace", fontWeight: "700", style: { transition: "fill 0.5s" } }, score),
    React.createElement("text", { x: cx, y: cy + 16, textAnchor: "middle", fill: "#444", fontSize: 9, fontFamily: "monospace" }, "/ 100")
  );
}

function Pill({ label, active, ac, bg, bc }) {
  return React.createElement("span", {
    className: "pill",
    style: { background: active ? bg : "#161616", color: active ? ac : "#3a3a3a", borderColor: active ? bc : "#252525" }
  }, label);
}

function App() {
  const [data, setData]     = useState({ mq2: 0, temp: 0, humidity: 0, flame: false, motion: false, risk: 0, aqi: 50, aqiBase: 50, field4Raw: "n/a" });
  const [risk, setRisk]     = useState(0);
  const [alerts, setAlerts] = useState([]);
  const [time, setTime]     = useState(new Date());
  const [online, setOnline] = useState(false);
  const [lastUpdated, setLastUpdated] = useState("--:--:--");

  useEffect(() => {
    const tick = async () => {
      setTime(new Date());
      try {
        const next = await fetchData();
        setOnline(true);
        setLastUpdated(new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }));
        setData(next);
        const r = calcRisk(next);
        setRisk(r);
        if (r >= 30) {
          const msg = next.flame ? "Flame detected!"
            : next.mq2 > MQ2_HIGH ? "High gas level — MQ2"
            : next.aqi > AQI_HIGH ? "Poor air quality — AQI"
            : next.temp > 45 ? "Temperature critical"
            : "Hazard threshold crossed";
          setAlerts(prev => [
            { time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }), msg, lvl: r >= 60 ? "high" : "mod" },
            ...prev
          ].slice(0, 5));
        }
      } catch (e) {
        setOnline(false);
      }
    };
    tick();
    const id = setInterval(tick, 16000); // ThingSpeak min 15s
    return () => clearInterval(id);
  }, []);

  const rc     = getRiskColor(risk);
  const mq2col = data.mq2 > MQ2_HIGH ? "#ef4444" : data.mq2 > MQ2_MODERATE ? "#f59e0b" : "#10b981";
  const aqiCol = data.aqi > AQI_HIGH ? "#ef4444" : data.aqi > AQI_MODERATE ? "#f59e0b" : "#10b981";
  const tcol   = data.temp > 45 ? "#ef4444" : data.temp > 35 ? "#f59e0b" : "#60a5fa";

  return React.createElement("div", { className: "phone" },

    // Header
    React.createElement("div", { className: "header" },
      React.createElement("div", null,
        React.createElement("div", { style: { color: "#f0f0f0", fontSize: 17, fontWeight: 600, letterSpacing: "-0.3px" } }, "SafeGuard"),
        React.createElement("div", { style: { color: "#444", fontSize: 10, marginTop: 2 } }, ROOM_NAME)
      ),
      React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 7 } },
        React.createElement("div", { className: "live-dot", style: { background: online ? "#10b981" : "#ef4444" } }),
        React.createElement("span", { style: { color: online ? "#10b981" : "#ef4444", fontSize: 10, fontFamily: "monospace" } }, online ? "TS ONLINE" : "TS OFFLINE"),
        React.createElement("span", { style: { color: "#444", fontSize: 11, fontFamily: "monospace" } },
          time.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" })
        )
      )
    ),

    React.createElement("div", { className: "content" },

      // Risk gauge card
      React.createElement("div", {
        style: { background: "#111", borderRadius: 18, padding: "16px 16px 14px", marginBottom: 10,
          border: `0.5px solid ${risk >= 60 ? "#2a1010" : risk >= 30 ? "#2a1e00" : "#0e2018"}`,
          display: "flex", alignItems: "center", gap: 10 }
      },
        React.createElement(Gauge, { score: risk }),
        React.createElement("div", { style: { flex: 1 } },
          React.createElement("div", { className: "label" }, "Risk Score"),
          React.createElement("div", { style: { color: rc, fontSize: 20, fontWeight: 700, marginTop: 5, letterSpacing: "-0.4px", transition: "color 0.5s" } }, getRiskLabel(risk)),
          React.createElement("div", { style: { color: "#3d3d3d", fontSize: 11, marginTop: 5, lineHeight: 1.5 } }, getRiskMsg(risk)),
          React.createElement("div", { style: { display: "flex", gap: 5, marginTop: 10, flexWrap: "wrap" } },
            React.createElement(Pill, { label: "FLAME",  active: data.flame,  ac: "#f87171", bg: "#2a0808", bc: "#7f1d1d" }),
            React.createElement(Pill, { label: "MOTION", active: data.motion, ac: "#818cf8", bg: "#0d0d2a", bc: "#3730a3" })
          )
        )
      ),

      // MQ2 gas card
      React.createElement("div", { className: "card", style: { marginBottom: 10 } },
        React.createElement("div", { className: "label" }, "MQ2 Gas / Smoke"),
        React.createElement("div", { style: { color: "#e8e8e8", fontSize: 28, fontWeight: 600, fontFamily: "monospace", margin: "5px 0 2px", lineHeight: 1 } }, data.mq2),
        React.createElement("div", { style: { color: "#3d3d3d", fontSize: 10, marginBottom: 10 } }, "ADC raw  ·  threshold " + MQ2_HIGH),
        React.createElement(Bar, { val: data.mq2, max: MQ2_MAX, color: mq2col }),
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", marginTop: 5 } },
          React.createElement("span", { style: { fontSize: 9, color: "#3a3a3a" } }, "0"),
          React.createElement("span", { style: { fontSize: 9, color: mq2col } }, Math.round((data.mq2 / MQ2_MAX) * 100) + "%"),
          React.createElement("span", { style: { fontSize: 9, color: "#3a3a3a" } }, MQ2_MAX)
        )
      ),

      // AQI card (sensor + randomized base)
      React.createElement("div", { className: "card", style: { marginBottom: 10 } },
        React.createElement("div", { className: "label" }, "AQI"),
        React.createElement("div", { style: { color: "#e8e8e8", fontSize: 28, fontWeight: 600, fontFamily: "monospace", margin: "5px 0 2px", lineHeight: 1 } }, data.aqi),
        React.createElement("div", { style: { color: "#3d3d3d", fontSize: 10, marginBottom: 10 } }, `Sensor + base(${data.aqiBase})`),
        React.createElement(Bar, { val: data.aqi, min: 50, max: AQI_MAX, color: aqiCol }),
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", marginTop: 5 } },
          React.createElement("span", { style: { fontSize: 9, color: "#3a3a3a" } }, "50"),
          React.createElement("span", { style: { fontSize: 9, color: aqiCol } }, Math.round(((Math.min(AQI_MAX, Math.max(50, data.aqi)) - 50) / (AQI_MAX - 50)) * 100) + "%"),
          React.createElement("span", { style: { fontSize: 9, color: "#3a3a3a" } }, AQI_MAX)
        )
      ),

      // Temp + Humidity
      React.createElement("div", { className: "card", style: { marginBottom: 10 } },
        React.createElement("div", { style: { display: "flex", gap: 16 } },
          React.createElement("div", { style: { flex: 1 } },
            React.createElement("div", { className: "label" }, "Temperature"),
            React.createElement("div", { style: { display: "flex", alignItems: "baseline", gap: 3, margin: "4px 0 8px" } },
              React.createElement("span", { style: { color: tcol, fontSize: 28, fontWeight: 600, fontFamily: "monospace", transition: "color 0.5s" } }, data.temp),
              React.createElement("span", { style: { color: "#444", fontSize: 13 } }, "°C")
            ),
            React.createElement(Bar, { val: data.temp, max: 60, color: tcol })
          ),
          React.createElement("div", { style: { width: "0.5px", background: "#1e1e1e" } }),
          React.createElement("div", { style: { flex: 1 } },
            React.createElement("div", { className: "label" }, "Humidity"),
            React.createElement("div", { style: { display: "flex", alignItems: "baseline", gap: 3, margin: "4px 0 8px" } },
              React.createElement("span", { style: { color: "#60a5fa", fontSize: 28, fontWeight: 600, fontFamily: "monospace" } }, data.humidity),
              React.createElement("span", { style: { color: "#444", fontSize: 13 } }, "%")
            ),
            React.createElement(Bar, { val: data.humidity, max: 100, color: "#60a5fa" })
          )
        )
      ),

      // Flame card
      React.createElement("div", {
        className: "card",
        style: { marginBottom: 10, border: `0.5px solid ${data.flame ? "#3d1111" : "#1f1f1f"}` }
      },
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
          React.createElement("span", { className: "label" }, "Flame sensor"),
          React.createElement("span", { style: { fontSize: 10, fontFamily: "monospace", color: data.flame ? "#ef4444" : "#10b981" } },
            data.flame ? "FIRE DETECTED" : "CLEAR"
          )
        ),
        React.createElement("div", { style: { marginTop: 8, color: data.flame ? "#fca5a5" : "#4b5563", fontSize: 11, lineHeight: 1.5 } },
          data.flame ? "Flame source detected. Check immediately." : "No flame detected."
        )
      ),

      // Active outputs
      React.createElement("div", { className: "card", style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 } },
        React.createElement("span", { style: { color: "#444", fontSize: 11 } }, "Active outputs"),
        React.createElement("div", { style: { display: "flex", gap: 16 } },
          ...["BUZZER", "LED"].map(o =>
            React.createElement("div", { key: o, style: { display: "flex", alignItems: "center", gap: 6 } },
              React.createElement("div", { style: { width: 7, height: 7, borderRadius: "50%", background: risk > 30 ? "#ef4444" : "#222", transition: "background 0.5s" } }),
              React.createElement("span", { style: { color: risk > 30 ? "#ef4444" : "#3a3a3a", fontSize: 11, fontFamily: "monospace", transition: "color 0.5s" } }, o)
            )
          )
        )
      ),

      // Alert log
      alerts.length > 0 && React.createElement("div", { className: "card" },
        React.createElement("div", { className: "label", style: { marginBottom: 9 } }, "Alert log"),
        ...alerts.map((a, i) =>
          React.createElement("div", { key: i, className: "alert-row", style: { borderTop: i === 0 ? "none" : "0.5px solid #181818" } },
            React.createElement("div", { style: { width: 6, height: 6, borderRadius: "50%", background: a.lvl === "high" ? "#ef4444" : "#f59e0b", marginTop: 3, flexShrink: 0 } }),
            React.createElement("div", { style: { flex: 1 } },
              React.createElement("div", { style: { color: "#cccccc", fontSize: 12 } }, a.msg),
              React.createElement("div", { style: { color: "#3d3d3d", fontSize: 10, marginTop: 2, fontFamily: "monospace" } }, a.time)
            )
          )
        )
      )
    ),

    // Footer
    React.createElement("div", { className: "bottom" },
      React.createElement("span", { style: { color: "#2d2d2d", fontSize: 10 } }, "ESP32 · ThingSpeak"),
      React.createElement("span", { style: { color: "#2d2d2d", fontSize: 10, fontFamily: "monospace" } }, "last: " + lastUpdated)
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
